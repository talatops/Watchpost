<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="#0F1117"/>
  
  <!-- Watchtower W mark -->
  <!-- Left battlement top cap -->
  <rect x="34" y="52" width="22" height="6" rx="2" fill="#00BCD4"/>
  <!-- Right battlement top cap -->
  <rect x="144" y="52" width="22" height="6" rx="2" fill="#00BCD4"/>
  <!-- Center beacon top cap -->
  <rect x="89" y="52" width="22" height="6" rx="2" fill="#00BCD4"/>
  
  <!-- Left tower pillar -->
  <rect x="36" y="58" width="18" height="62" rx="2" fill="#00BCD4"/>
  <!-- Right tower pillar -->
  <rect x="146" y="58" width="18" height="62" rx="2" fill="#00BCD4"/>
  
  <!-- Left-center diagonal leg (W left inner leg going down-right) -->
  <polygon points="54,58 72,58 100,120 82,120" fill="#00BCD4"/>
  <!-- Right-center diagonal leg (W right inner leg going down-left) -->
  <polygon points="146,58 128,58 100,120 118,120" fill="#00BCD4"/>
  
  <!-- Center observation beacon (filled circle, glowing) -->
  <circle cx="100" cy="49" r="7" fill="#00BCD4"/>
  <circle cx="100" cy="49" r="11" fill="#00BCD4" opacity="0.25"/>
  
  <!-- Base platform -->
  <rect x="30" y="122" width="140" height="5" rx="2.5" fill="#00BCD4" opacity="0.6"/>
  
  <!-- Wordmark -->
  <text x="100" y="158" 
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="18" font-weight="700" letter-spacing="5"
    fill="#FFFFFF" text-anchor="middle">WATCHPOST</text>
  
  <!-- Tagline -->
  <text x="100" y="176"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="9" font-weight="400" letter-spacing="2"
    fill="#00BCD4" text-anchor="middle" opacity="0.8">DEVICE FLEET MANAGEMENT</text>
</svg>
